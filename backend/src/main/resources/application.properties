# Project Metadata
spring.application.name=barberconnect-backend
server.port=8080
server.servlet.context-path=/api

# Database Connection (Reads from your .env)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
# Use 'update' during development to match your ERD, 'validate' once tables are set
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Security (For your Jwts.parserBuilder)
app.jwt.secret=${SUPABASE_JWT_SECRET}

# CORS Configuration (Matches your React Frontend)
cors.allowedOrigins=http://localhost:3000
cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS
cors.allowedHeaders=*
cors.allowCredentials=true