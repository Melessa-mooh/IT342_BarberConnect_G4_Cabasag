# Test-only application properties — overrides main application.properties
# All secrets are replaced with safe dummy values so @SpringBootTest can load
# the context without real credentials.

spring.application.name=barberconnect-backend-test

server.port=8080
server.servlet.context-path=/api/v1

# Firebase — point to a non-existent file; FirebaseConfig handles missing gracefully
firebase.service-account-key=classpath:serviceAccountKey-test.json
firebase.project.id=barberconnect-test

# Google OAuth2 — dummy values
spring.security.oauth2.client.registration.google.client-id=test-client-id.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# JWT — dummy secret (must be >=32 chars for HMAC-SHA256)
jwt.secret=test-secret-key-for-unit-tests-only-32chars
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Firebase web API key — dummy
firebase.web-api-key=test-firebase-web-api-key

# Cloudinary — dummy values (no real uploads in tests)
cloudinary.cloud-name=test-cloud
cloudinary.api-key=123456789
cloudinary.api-secret=test-cloudinary-secret

# CORS
cors.allowed-origins=http://localhost:5173
frontend.url=http://localhost:5173

# Suppress verbose logging in tests
logging.level.edu.cit.cabasag.barberconnect=WARN
logging.level.org.springframework.security=WARN
logging.level.root=WARN
